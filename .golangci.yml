version: "2"

linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - unused
    - misspell

formatters:
  enable:
    - gofmt
    - goimports

run:
  timeout: 5m

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

linters-settings:
  errcheck:
    # In a CLI tool it is idiomatic (and expected) to ignore errors from
    # fmt.Fprint* when writing human output to cmd.OutOrStdout()/Stderr.
    # Almost all new output in the auth/init wizard falls into this category.
    exclude-functions:
      - fmt.Fprint
      - fmt.Fprintf
      - fmt.Fprintln
      - fmt.Print
      - fmt.Printf
      - fmt.Println

  staticcheck:
    # ST1005 complains about capitalized or punctuated error strings.
    # We keep proper English + punctuation in user-facing CLI errors
    # (e.g. multi-line guidance for OAuth App setup on GHES/self-hosted).
    checks: ["all", "-ST1005"]
