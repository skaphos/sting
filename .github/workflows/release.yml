name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  release:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0
      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.2
      - name: Mint Homebrew app token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}
          owner: skaphos
          repositories: homebrew-tools
          skip-token-revoke: false
      - name: Determine GoReleaser args
        id: goreleaser_args
        shell: bash
        env:
          HOMEBREW_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [ -z "${HOMEBREW_TOKEN}" ]; then
            echo "args=release --clean --skip=homebrew" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub App token was not minted; skipping Homebrew formula publish."
            exit 0
          fi

          if curl --silent --show-error --fail \
            --header "Authorization: Bearer ${HOMEBREW_TOKEN}" \
            --header "Accept: application/vnd.github+json" \
            https://api.github.com/repos/skaphos/homebrew-tools >/dev/null; then
            echo "args=release --clean" >> "$GITHUB_OUTPUT"
          else
            echo "args=release --clean --skip=homebrew" >> "$GITHUB_OUTPUT"
            echo "::warning::GitHub App token cannot access skaphos/homebrew-tools; skipping Homebrew formula publish."
          fi
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: v2.17.0
          args: ${{ steps.goreleaser_args.outputs.args }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          # macOS notarization (cross-platform via quill). When these secrets are
          # unset the notarize block is auto-skipped, so the release still works.
          MACOS_SIGN_P12: ${{ secrets.MACOS_SIGN_P12 }}
          MACOS_SIGN_PASSWORD: ${{ secrets.MACOS_SIGN_PASSWORD }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_KEY: ${{ secrets.MACOS_NOTARY_KEY }}
      - name: Attest release archives
        uses: actions/attest-build-provenance@v4
        with:
          subject-checksums: dist/checksums.txt
      - name: Attest release metadata artifacts
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/checksums.txt
            dist/*.sbom.json
            dist/*.sigstore.json
