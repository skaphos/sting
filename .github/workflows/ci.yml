name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default for all jobs. Every job only reads the repo
# (checkout, build, test, lint); artifact uploads and step summaries do not
# require token scopes. Grant narrower per-job permissions if a job ever needs
# more (e.g. contents: write for releases).
permissions:
  contents: read

jobs:
  dco:
    name: DCO
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Verify Signed-off-by on PR commits
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          set -euo pipefail
          git fetch --no-tags --prune origin "${BASE_REF}:${BASE_REF}"
          missing=0
          while IFS= read -r commit; do
            [ -z "$commit" ] && continue
            if ! git log -1 --pretty=%B "$commit" | grep -qi '^Signed-off-by: '; then
              echo "Missing Signed-off-by trailer: $commit"
              missing=1
            fi
          done < <(git rev-list --no-merges "origin/${BASE_REF}..HEAD")

          if [ "$missing" -ne 0 ]; then
            echo "DCO check failed. Rebase/amend with: git commit --signoff"
            exit 1
          fi

  reuse:
    name: REUSE
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install REUSE tool
        run: python -m pip install --upgrade pip reuse
      - name: Run REUSE lint
        run: reuse lint

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run lint task
        run: go -C tools tool task lint

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run coverage test task
        run: go -C tools tool task test-cover
      - name: Check coverage
        if: matrix.os == 'ubuntu-latest'
        run: |
          ./scripts/check-coverage.sh coverage.out
      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ github.sha }}
          path: coverage.out
          if-no-files-found: error
          retention-days: 30

  quality:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run staticcheck task
        run: go -C tools tool task staticcheck
      - name: Run vulnerability task
        run: go -C tools tool task vuln

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [dco, reuse, lint, test, quality]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true
      - name: Run CI build task
        run: go -C tools tool task -d .. build-ci

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [dco, reuse, lint, test, quality, build]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Publish workflow summary
        env:
          DCO_RESULT: ${{ needs.dco.result }}
          REUSE_RESULT: ${{ needs.reuse.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_RESULT: ${{ needs.test.result }}
          QUALITY_RESULT: ${{ needs.quality.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          total=6
          success=0
          failed=0
          skipped=0
          cancelled=0

          for result in "$DCO_RESULT" "$REUSE_RESULT" "$LINT_RESULT" "$TEST_RESULT" "$QUALITY_RESULT" "$BUILD_RESULT"; do
            case "$result" in
              success) success=$((success + 1)) ;;
              failure) failed=$((failed + 1)) ;;
              skipped) skipped=$((skipped + 1)) ;;
              cancelled) cancelled=$((cancelled + 1)) ;;
              *) failed=$((failed + 1)) ;;
            esac
          done

          {
            echo "## CI Summary"
            echo
            echo "| Job | Result |"
            echo "| --- | --- |"
            echo "| dco | $DCO_RESULT |"
            echo "| reuse | $REUSE_RESULT |"
            echo "| lint | $LINT_RESULT |"
            echo "| test | $TEST_RESULT |"
            echo "| quality | $QUALITY_RESULT |"
            echo "| build | $BUILD_RESULT |"
            echo
            echo "- Total jobs: $total"
            echo "- Success: $success"
            echo "- Failed: $failed"
            echo "- Skipped: $skipped"
            echo "- Cancelled: $cancelled"
            if [ "$failed" -gt 0 ]; then
              echo
              echo "### Key Failures"
              if [ "$DCO_RESULT" = "failure" ]; then echo "- dco failed"; fi
              if [ "$REUSE_RESULT" = "failure" ]; then echo "- reuse failed"; fi
              if [ "$LINT_RESULT" = "failure" ]; then echo "- lint failed"; fi
              if [ "$TEST_RESULT" = "failure" ]; then echo "- test failed"; fi
              if [ "$QUALITY_RESULT" = "failure" ]; then echo "- quality failed"; fi
              if [ "$BUILD_RESULT" = "failure" ]; then echo "- build failed"; fi
            fi
          } >> "$GITHUB_STEP_SUMMARY"
