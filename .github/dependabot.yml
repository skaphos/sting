version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
    # Limit Dependabot to direct module dependencies only.
    # This excludes the tool dependency graph from alerts/PRs.
    allow:
      - dependency-type: direct
  - package-ecosystem: gomod
    directory: /tools
    schedule:
      interval: weekly
  # Track GitHub Actions versions so workflow action bumps (checkout,
  # setup-go, goreleaser, release-please, etc.) surface as PRs automatically.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
