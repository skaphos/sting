version: 2

project_name: sting

builds:
  - id: sting
    main: ./cmd/sting
    binary: sting
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/skaphos/sting/internal/cli.Version={{.Version}}
      - -X github.com/skaphos/sting/internal/cli.Commit={{.Commit}}
      - -X github.com/skaphos/sting/internal/cli.Date={{.Date}}

# macOS code signing + notarization, cross-platform via quill (no Mac runner
# required). Auto-skipped unless all five MACOS_* secrets are set, so local/
# snapshot builds and forks without the secrets are unaffected. Runs after build
# and before archive, so the signed+notarized binary is what gets tarred,
# checksummed, SBOM'd, and cosign-signed.
notarize:
  macos:
    - enabled: >-
        {{ and (isEnvSet "MACOS_SIGN_P12") (isEnvSet "MACOS_SIGN_PASSWORD")
        (isEnvSet "MACOS_NOTARY_ISSUER_ID") (isEnvSet "MACOS_NOTARY_KEY_ID")
        (isEnvSet "MACOS_NOTARY_KEY") }}
      ids:
        - sting
      sign:
        # base64-encoded Developer ID Application .p12 (certificate + private key)
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        # App Store Connect API key (issuer UUID, key ID, base64-encoded .p8)
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 20m

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - THIRD_PARTY_NOTICES.md
      - third_party_licenses/**

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

signs:
  - cmd: cosign
    artifacts: checksum
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - --bundle=${signature}
      - ${artifact}
      - --yes

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - "^chore\\("
      - "^build:"
      - "^refactor:"
      - "^style:"
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Bug Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Performance Improvements
      regexp: '^.*?perf(\(.+\))??!?:.+$'
      order: 2
    - title: Reverts
      regexp: '^.*?revert(\(.+\))??!?:.+$'
      order: 3
    - title: Others
      order: 999

release:
  draft: false
  make_latest: true
  header: |
    ## Changelog
  footer: |
    See [CHANGELOG.md](https://github.com/skaphos/sting/blob/{{ .Tag }}/CHANGELOG.md) for the full release notes.

homebrew_casks:
  - repository:
      owner: skaphos
      name: homebrew-tools
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/skaphos/sting"
    description: "Query a GitHub user's commits over a time window, as a CLI or MCP server"
    license: "MIT"
    binaries:
      - sting
    custom_block: |
      postflight do
        if OS.mac?
          system_command "/usr/bin/xattr",
                         args: ["-dr", "com.apple.quarantine", "#{staged_path}/sting"]
        end
      end

snapshot:
  version_template: "{{ .Tag }}-next"
